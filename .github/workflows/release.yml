name: Release

# Publishes the launcher packages under packages/* to the PUBLIC npm registry
# on any `v*` tag. Both packages are runtime launchers (they fetch
# @revturbine/cli@latest), so releases are rare — a tag just means "publish
# whatever version is not already on npm". Each package is versioned
# independently in its own package.json; bump the one you changed and push any
# `v*` tag.
#
# Requires the NPM_TOKEN secret (an npm automation token; bypasses 2FA).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Publish each package whose version is not already on npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in packages/*/; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "· $name@$version already on npm — skipping"
            else
              echo "→ publishing $name@$version"
              ( cd "$dir" && npm publish --access public --provenance )
            fi
          done
