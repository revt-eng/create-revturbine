name: Release

# Publishes `create-revturbine` to the PUBLIC npm registry when a v* tag is
# pushed. Modelled on revturbine-cli's release workflow: the tag drives the
# release, package.json's version is what ships, and a guard refuses a tag that
# disagrees with it.
#
# Requires the NPM_TOKEN secret (an npm automation token with publish rights).
# Automation tokens bypass 2FA — which is the whole reason releases run here
# rather than from someone's laptop.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm run check:range
      - name: Guard — tag must match package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json ($PKG_VERSION). Bump package.json and re-tag."
            exit 1
          fi
      - name: Publish to public npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
