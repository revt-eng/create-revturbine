name: PR gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Smoke — each launcher reaches `revturbine init` via npx @latest
        run: |
          set -euo pipefail
          # Both packages are runtime launchers with no declared @revturbine/cli
          # dependency; they fetch it at run time. Assert each reaches init's OWN
          # help — grepping for "init" anywhere would also match "instance".
          echo "— create-revturbine —"
          node packages/create-revturbine/index.mjs --help > cr.txt 2>&1 || true
          grep -q "Scaffold RevTurbine into this app" cr.txt || { echo "::error::create-revturbine did not reach init"; cat cr.txt; exit 1; }

          echo "— revturbine (create) —"
          node packages/revturbine/index.mjs create --help > rv.txt 2>&1 || true
          grep -q "Scaffold RevTurbine into this app" rv.txt || { echo "::error::revturbine create did not reach init"; cat rv.txt; exit 1; }

          echo "Both launchers reach the CLI."
