name: PR gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Smoke — the launcher reaches `revturbine init` via npx @latest
        run: |
          set -euo pipefail
          # No declared dependency: the launcher fetches @revturbine/cli@latest
          # at run time. Assert it reaches init's OWN help — grepping for "init"
          # anywhere would also match "instance".
          node index.mjs --help > out.txt 2>&1 || true
          if ! grep -q "Scaffold RevTurbine into this app" out.txt; then
            echo "::error::Launcher did not reach the CLI's init command."
            cat out.txt
            exit 1
          fi
          echo "Launcher reached revturbine init."
